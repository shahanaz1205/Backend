name: CI

# Trigger: run on every push to main, and on pull requests targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # GitHub provides a fresh Ubuntu VM for every run (free)
    runs-on: ubuntu-latest

    steps:
      # Step 1: download the repository code onto the VM
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: install Python 3.11 on the VM
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: install all Python packages
      - name: Install dependencies
        run: |
          cd student-api
          pip install -r requirements.txt

      # Step 4: run the tests
      - name: Run tests
        run: |
          cd student-api
          python -m pytest tests/ -v
        env:
          # Provide the secrets the app needs during testing
          # These values are for CI only — use GitHub Secrets for real values
          SECRET_KEY: test-secret-key-for-ci-only-not-production
          GEMINI_API_KEY: dummy-key-not-used-in-tests